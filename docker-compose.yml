services:
  mongo:
    image: mongo:7
    container_name: dynamicconfig-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dynamicconfig

  rabbitmq:
    image: rabbitmq:3-management
    container_name: dynamicconfig-rabbitmq
    ports:
      - "5672:5672"     # AMQP - publisher/consumer traffic
      - "15672:15672"   # management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dynamicconfig

  # --- EXTRA phases (remaining) ---
  # webui:        ASP.NET Core REST API + frontend (containerized in Phase 6)
  # demoservice:  sample consumer of DynamicConfig.Library (containerized in Phase 6)

volumes:
  mongo-data:

networks:
  dynamicconfig:
    driver: bridge
