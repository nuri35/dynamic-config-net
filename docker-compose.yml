services:
  mongo:
    image: mongo:7
    container_name: dynamicconfig-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dynamicconfig

  # --- EXTRA phases (added only after the Phase 4 core checkpoint) ---
  # rabbitmq:     rabbitmq:3-management — config-changed fanout exchange (Phase 5)
  # webui:        ASP.NET Core REST API + frontend (containerized in Phase 6)
  # demoservice:  sample consumer of DynamicConfig.Library (containerized in Phase 6)

volumes:
  mongo-data:

networks:
  dynamicconfig:
    driver: bridge
